<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT Enterprise Master System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 15px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.05); }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input, select { width: 94%; padding: 11px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px; font-size: 15px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .panel { display: none; margin-top: 20px; text-align: left; padding: 15px; border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; }
        .badge-wrapper { display: none; margin-top: 20px; }
        .id-card { width: 340px; height: 215px; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: white; border-radius: 10px; margin: auto; padding: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.15); text-align: left; position: relative; box-sizing: border-box; }
        .card-header { font-size: 14px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 4px; color: #00d2ff; text-transform: uppercase; }
        .card-body { display: flex; margin-top: 10px; gap: 10px; }
        .card-info { flex: 1; font-size: 11px; line-height: 1.4; }
        .card-info .name { font-size: 14px; font-weight: bold; color: white; }
        .card-info .role { font-size: 11px; color: #ffbc00; font-weight: bold; margin-bottom: 5px; }
        .card-photo { width: 75px; height: 85px; background: #eee; border-radius: 4px; overflow: hidden; border: 2px solid white; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; }
        .card-qr { width: 65px; height: 65px; background: white; padding: 3px; border-radius: 4px; position: absolute; bottom: 30px; right: 12px; }
        .card-qr img { width: 100%; height: 100%; }
        .card-footer { position: absolute; bottom: 8px; left: 12px; right: 12px; display: flex; justify-content: space-between; font-size: 8px; color: rgba(255,255,255,0.6); border-top: 1px solid rgba(255,255,255,0.1); padding-top: 4px; }
        #cameraStream { width: 100%; height: 150px; background: #000; border-radius: 6px; margin-bottom: 10px; display: none; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; background: #000; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-area"><h2 style="margin:0; font-size: 20px;">SGT MASTER SYSTEM</h2></div>
    <p id="mainSub" style="color:#666; font-size:13px;">Loading Scanner...</p>
    <div id="reader"></div>

    <div class="panel" id="superAdminPanel">
        <h3 style="color: #007bff; margin: 0 0 10px 0;">👑 Super-Admin Panel</h3>
        <input type="text" id="compName" placeholder="Company Name (e.g., Softwire)">
        <input type="text" id="clientName" placeholder="Client Owner Name">
        <input type="text" id="clientCity" placeholder="City">
        <input type="text" id="clientMobile" placeholder="Mobile Number">
        <input type="text" id="clientDesig" placeholder="Designation">
        <label style="font-size:12px; font-weight:bold;">Upload Company Logo:</label>
        <input type="file" id="logoUpload" accept="image/*" style="border:none; padding:5px;">
        <button onclick="generateClient()">Create Client & Sync Sheet</button>
        <div id="superQrOutput" style="margin-top:15px; text-align:center;"></div>
    </div>

    <div class="panel" id="clientAdminPanel">
        <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <img id="clientPanelLogo" src="" style="max-height:40px; display:none; border-radius:4px;">
            <h3 id="adminTitle" style="margin:0;">👑 Client Dashboard</h3>
        </div>
        <input type="text" id="staffName" placeholder="Staff Full Name">
        <select id="staffDesig">
            <option value="Machine Operator">Machine Operator</option>
            <option value="Service Engineer">Service Engineer</option>
        </select>
        <button type="button" onclick="startCamera()" style="background-color:#17a2b8;">📸 Open Staff Camera</button>
        <video id="cameraStream" autoplay playsinline></video>
        <button type="button" id="snapBtn" onclick="takeSnapshot()" style="background-color:#6f42c1; display:none;">🎯 Capture Photo</button>
        <canvas id="photoCanvas" style="display:none;"></canvas>
        <input type="hidden" id="capturedPhotoData">
        <button onclick="createStaffBadge()" style="margin-top:10px;">Generate Staff Smart Badge</button>
    </div>

    <div class="badge-wrapper" id="badgeWrapper">
        <div class="id-card" id="idCardDevice">
            <div class="card-header" id="cardCompName">COMPANY SYSTEM</div>
            <div class="card-body">
                <div class="card-info">
                    <div class="name" id="cardHolderName">Name</div>
                    <div class="role" id="cardHolderRole">Role</div>
                    <div><strong>City:</strong> <span id="cardHolderCity">-</span></div>
                    <div><strong>Mob:</strong> <span id="cardHolderMob">-</span></div>
                    <div><strong>Status:</strong> Verified</div>
                </div>
                <div class="card-photo"><img id="cardPhotoImg" src="" alt="Staff Photo"></div>
                <div class="card-qr" id="cardQrContainer"></div>
            </div>
            <div class="card-footer">
                <div>ISSUE: <span id="cardIssueDate">-</span></div>
                <div>EXPIRY: <span id="cardExpiryDate">-</span></div>
            </div>
        </div>
        <button onclick="window.print()" style="background-color:#28a745; margin-top:10px;">🖨️ Print / Save PDF</button>
    </div>
</div>

<script>
let html5QrCode; let localStream; let uploadedLogoBase64 = "";
let currentClientCompany = "Company"; let currentClientCity = "-"; let currentClientMob = "-";
const webAppUrl = "https://script.google.com/macros/s/AKfycbyOfdLblRpwI04yiq2RfzwyVuGDxYmHhAH0eHur69s4cbEgibUgI-SPhNi_yN-wEZGU/exec";

document.getElementById('logoUpload').addEventListener('change', function(e) {
    let file = e.target.files[0]; let reader = new FileReader();
    reader.onloadend = function() { uploadedLogoBase64 = reader.result; }
    if (file) { reader.readAsDataURL(file); }
});

window.addEventListener('DOMContentLoaded', () => {
    html5QrCode = new Html5Qrcode("reader");
    Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length > 0) {
            html5QrCode.start(cameras[cameras.length-1].id, { fps: 10, qrbox: 250 }, onScanSuccess, () => {});
        }
    }).catch(() => { document.getElementById("mainSub").innerText = "Camera Permission Required."; });
});

function onScanSuccess(decodedText) {
    html5QrCode.stop(); document.getElementById("reader").style.display = "none";
    if(decodedText.includes("AZEEM-SUPER")) {
        document.getElementById("superAdminPanel").style.display = "block";
    } else if(decodedText.includes("CLIENT-LOG-")) {
        let data = JSON.parse(decodedText.replace("CLIENT-LOG-", ""));
        currentClientCompany = data.comp; currentClientCity = data.city || "-"; currentClientMob = data.mob || "-";
        document.getElementById("clientAdminPanel").style.display = "block";
        document.getElementById("adminTitle").innerText = data.comp + " Admin";
        if(data.logo) { let img = document.getElementById("clientPanelLogo"); img.src = data.logo; img.style.display = "block"; }
    }
}

function getGPSLocation(callback) {
    navigator.geolocation.getCurrentPosition((pos) => callback(`${pos.coords.latitude},${pos.coords.longitude}`), () => callback("Permission Denied"));
}

function generateClient() {
    let comp = document.getElementById("compName").value; let name = document.getElementById("clientName").value;
    let city = document.getElementById("clientCity").value; let mob = document.getElementById("clientMobile").value;
    let desig = document.getElementById("clientDesig").value;
    if(!comp || !name) { alert("Fill all fields"); return; }
    getGPSLocation((geo) => {
        let clientData = { comp: comp, name: name, city: city, mob: mob, desig: desig, logo: uploadedLogoBase64, geo: geo, type: "NEW_CLIENT" };
        let qrStr = "CLIENT-LOG-" + JSON.stringify({ comp: comp, city: city, mob: mob, logo: uploadedLogoBase64 });
        let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrStr)}`;
        document.getElementById("superQrOutput").innerHTML = `<h4>${comp} QR Code</h4><img src="${qrUrl}">`;
        fetch(webAppUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(clientData) });
    });
}

function startCamera() {
    document.getElementById("cameraStream").style.display = "block"; document.getElementById("snapBtn").style.display = "block";
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => { localStream = stream; document.getElementById("cameraStream").srcObject = stream; });
}

function takeSnapshot() {
    let video = document.getElementById("cameraStream"); let canvas = document.getElementById("photoCanvas");
    canvas.width = video.videoWidth; canvas.height = video.videoHeight; canvas.getContext('2d').drawImage(video, 0, 0);
    let dataUrl = canvas.toDataURL('image/jpeg');
    document.getElementById("capturedPhotoData").value = dataUrl; document.getElementById("cardPhotoImg").src = dataUrl;
    localStream.getTracks().forEach(track => track.stop()); video.style.display = "none"; document.getElementById("snapBtn").style.display = "none";
}

function createStaffBadge() {
    let name = document.getElementById("staffName").value; let desig = document.getElementById("staffDesig").value; let photo = document.getElementById("capturedPhotoData").value;
    if(!name || !photo) { alert("Enter name and capture photo"); return; }
    let t = new Date(); let issue = t.getDate() + '/' + (t.getMonth()+1) + '/' + t.getFullYear(); let expiry = t.getDate() + '/' + (t.getMonth()+1) + '/' + (t.getFullYear()+1);
    document.getElementById("cardCompName").innerText = currentClientCompany.toUpperCase() + " SYSTEM";
    document.getElementById("cardHolderName").innerText = name; document.getElementById("cardHolderRole").innerText = desig;
    document.getElementById("cardHolderCity").innerText = currentClientCity; document.getElementById("cardHolderMob").innerText = currentClientMob;
    document.getElementById("cardIssueDate").innerText = issue; document.getElementById("cardExpiryDate").innerText = expiry;
    let staffToken = `STAFF-${desig}-${name}-${Math.floor(1000+Math.random()*9000)}`;
    document.getElementById("cardQrContainer").innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=70x70&data=${staffToken}">`;
    document.getElementById("badgeWrapper").style.display = "block";
    getGPSLocation((geo) => {
        let staffLog = { type: "NEW_STAFF", comp: currentClientCompany, name: name, desig: desig, geo: geo, photo: photo };
        fetch(webAppUrl, { method: "POST", mode: "no-cors", body: JSON.stringify(staffLog) });
    });
}
</script>
</body>
</html>
